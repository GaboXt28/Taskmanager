<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Iniciar Sesión')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container my-auto py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">

            <div class="card border-0 shadow-sm">
                <div class="card-header text-white text-center py-3" style="background: var(--color-primario);">
                    <i class="fas fa-lock fa-2x mb-2 d-block"></i>
                    <h4 class="mb-0 fw-bold">Iniciar Sesión</h4>
                </div>
                <div class="card-body p-4">

                    <!-- Alertas -->
                    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${successMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${logoutMsg}" class="alert alert-info alert-dismissible fade show" role="alert">
                        <i class="fas fa-info-circle me-2"></i>
                        <span th:text="${logoutMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="fas fa-user me-1 text-muted"></i>Usuario
                            </label>
                            <input type="text" id="username" name="username"
                                   class="form-control" placeholder="Ingresa tu usuario"
                                   required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-key me-1 text-muted"></i>Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" id="password" name="password"
                                       class="form-control" placeholder="Ingresa tu contraseña"
                                       required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">
                                <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                            </button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-1 text-muted small">¿No tienes cuenta?</p>
                        <a th:href="@{/register}" class="btn btn-outline-success btn-sm fw-semibold">
                            <i class="fas fa-user-plus me-1"></i>Crear Cuenta
                        </a>
                    </div>

                    <hr class="my-3">
                    <div class="text-center small text-muted">
                        <p class="mb-1"><strong>Cuentas de prueba:</strong></p>
                        <p class="mb-0">Admin: <code>admin</code> / <code>admin123</code></p>
                        <p class="mb-0">Usuario: <code>usuario</code> / <code>user123</code></p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
