# ============================================================
# Configuración de la Aplicación
# ============================================================
spring.application.name=task-manager
server.port=8081

# ============================================================
# Base de Datos MySQL
# ============================================================
# Las credenciales NUNCA se escriben en texto plano aquí. Se leen de variables de entorno
# (DB_URL, DB_USERNAME, DB_PASSWORD) y, si no existen, se usa el valor por defecto tras los ":".
# Para desarrollo local, exporta las variables en tu sistema o en la configuración de tu IDE.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskmanager_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ============================================================
# Mensajes de error / i18n
# ============================================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ============================================================
# JWT (JSON Web Token)
# ============================================================
# jwt.secret: clave usada para firmar/verificar el token con HMAC-SHA256 (algoritmo HS256).
#   DEBE sobreescribirse con una variable de entorno JWT_SECRET en producción (>= 256 bits).
#   El valor por defecto solo existe para que el proyecto arranque "out of the box" en desarrollo.
# jwt.expiration: tiempo de vida del token en milisegundos (por defecto 1 hora).
jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1wYXJhLXRhc2stbWFuYWdlci1wcnltZXZvbHV0aW9uLWNhbWJpYXItZW4tcHJvZHVjY2lvbg==}
jwt.expiration=${JWT_EXPIRATION:3600000}
