<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Registrarse')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container my-auto py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5">

            <div class="card border-0 shadow-sm">
                <div class="card-header text-white text-center py-3" style="background: var(--color-primario);">
                    <i class="fas fa-user-plus fa-2x mb-2 d-block"></i>
                    <h4 class="mb-0 fw-bold">Crear Cuenta</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/register}" method="post" th:object="${user}" novalidate>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="fas fa-user me-1 text-muted"></i>Nombre de Usuario
                            </label>
                            <input type="text" id="username" th:field="*{username}"
                                   class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   placeholder="Ej: jperez" minlength="3" maxlength="50" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                <i class="fas fa-envelope me-1 text-muted"></i>Correo Electrónico
                            </label>
                            <input type="email" id="email" th:field="*{email}"
                                   class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="correo@ejemplo.com" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-key me-1 text-muted"></i>Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" id="password" th:field="*{password}"
                                       class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Mínimo 6 caracteres" minlength="6" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label fw-semibold">
                                <i class="fas fa-key me-1 text-muted"></i>Confirmar Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                       class="form-control" placeholder="Repite la contraseña" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('confirmPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg fw-bold">
                                <i class="fas fa-user-plus me-2"></i>Registrarme
                            </button>
                        </div>
                    </form>

                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-1 text-muted small">¿Ya tienes cuenta?</p>
                        <a th:href="@{/login}" class="btn btn-outline-primary btn-sm fw-semibold">
                            <i class="fas fa-sign-in-alt me-1"></i>Iniciar Sesión
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
